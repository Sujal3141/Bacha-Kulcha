<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Shadows and Lighting Filters -->
    <filter id="scene-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#ea580c" flood-opacity="0.15" />
    </filter>
    <filter id="button-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.12" />
    </filter>

    <!-- Rich Warm Color Gradients -->
    <radialGradient id="portal-bg-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffedd5" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#ffcbd1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="phone-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <linearGradient id="phone-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>

    <linearGradient id="coral-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e67" />
      <stop offset="100%" stop-color="#e23744" />
    </linearGradient>

    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Ground Ambient Glow (Coral/Orange Theme) -->
  <circle cx="256" cy="256" r="210" fill="url(#portal-bg-glow)" />

  <!-- Isometric Base Grid Floor Lines -->
  <g stroke="#ff7e67" stroke-opacity="0.15" stroke-width="1.5">
    <path d="M 96 256 L 256 120 L 416 256 L 256 392 Z" />
    <path d="M 50 256 L 256 80 L 462 256 L 256 432 Z" fill="none" />
    <path d="M 136 256 L 256 150 L 376 256 L 256 362 Z" />
    <!-- Ray alignments -->
    <path d="M 256 80 L 256 432" stroke-dasharray="4 4" />
    <path d="M 50 256 L 462 256" stroke-dasharray="4 4" />
  </g>

  <!-- MAIN ISOMETRIC SCENE BLOCK -->
  <!-- Transform to standard Isometric Projection Angle: rx=30, ry=45 -->
  <g transform="translate(256, 270)">
    
    <!-- Shadow for 3D Phone and Elements -->
    <ellipse cx="0" cy="80" rx="140" ry="40" fill="#1e293b" fill-opacity="0.12" filter="blur(16px)" />
    
    <!-- ================= 1. ISOMETRIC SMARTPHONE ================= -->
    <g transform="translate(-25, -40)" filter="url(#soft-shadow)">
      <!-- Left side edge / depth (3D Extrusion) -->
      <path d="M -74 -130 L -80 -124 L -80 126 L -74 120 Z" fill="#1e293b" />
      <!-- Bottom side edge / depth (3D Extrusion) -->
      <path d="M -80 126 L -36 150 L -30 144 L -74 120 Z" fill="#0f172a" />
      
      <!-- Phone Back/Main Body Box -->
      <path d="M -74 -130 L -30 -106 L 50 -146 L 6 -170 Z" fill="url(#phone-body)" />
      <!-- Phone Top Front Screen Surface -->
      <path d="M -74 -120 L -30 -96 L 46 -134 L 2 -158 Z" fill="url(#phone-body)" />
      
      <!-- Actual Display Screen (Isometric Projection) -->
      <path d="M -70 -114 L -28 -92 L 42 -127 L 0 -149 Z" fill="url(#phone-screen)" />
      
      <!-- Inner Screen elements (SaaS Interface mockup) -->
      <!-- App Header Bar -->
      <path d="M -54 -115 L -26 -101 L 18 -123 L -10 -137 Z" fill="url(#coral-gradient)" />
      
      <!-- UI Product Card 1: Gourmet Meal representation -->
      <path d="M -54 -74 L -18 -56 L -6 -62 L -42 -80 Z" fill="#ffffff" />
      <!-- Yellow rating bar or discount tag on card -->
      <path d="M -48 -71 L -32 -63 L -28 -65 L -44 -73 Z" fill="url(#gold-gradient)" />
      
      <!-- UI Product Card 2: Bakery item -->
      <path d="M -34 -34 L 2 -16 L 14 -22 L -22 -40 Z" fill="#ffffff" />
      
      <!-- Bottom CTA Button (Glowing Orange-red) -->
      <path d="M -54 -14 L -30 -2 L 10 -22 L -14 -34 Z" fill="url(#coral-gradient)" />
    </g>

    <!-- ================= 2. FLOATING PREMIUM GOURMET FOOD BOX ================= -->
    <g transform="translate(65, 20)">
      <!-- Box shadow -->
      <ellipse cx="0" cy="55" rx="45" ry="18" fill="#1e293b" fill-opacity="0.2" filter="blur(8px)" />

      <!-- Glowing aura -->
      <circle cx="0" cy="15" r="45" fill="url(#coral-gradient)" fill-opacity="0.15" filter="url(#scene-glow)" />

      <!-- Isometric Gourmet Food Case (Transparent Cover and Coral Base) -->
      <!-- Base Extrusion (Bottom Side) -->
      <path d="M -35 25 L 0 42 L 35 25 L 35 32 L 0 49 L -35 32 Z" fill="#b91c1c" />
      <!-- Base Top Surface -->
      <path d="M -35 25 L 0 42 L 35 25 L 0 8 Z" fill="url(#coral-gradient)" />

      <!-- Glass Cloche Cover / Transparent dome (Glassmorphic) -->
      <!-- Left Wall -->
      <path d="M -30 20 L 0 32 L 0 -15 L -30 -22 Z" fill="url(#glass-grad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.6" />
      <!-- Right Wall -->
      <path d="M 0 32 L 30 20 L 30 -22 L 0 -15 Z" fill="url(#glass-grad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4" />
      <!-- Dome Top -->
      <path d="M -30 -22 L 0 -15 L 30 -22 L 0 -34 Z" fill="url(#glass-grad)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7" />

      <!-- Sleek Glowing Loop (Marketplace Rescue Indicator) -->
      <ellipse cx="0" cy="-34" rx="10" ry="4" fill="none" stroke="#fbbf24" stroke-width="2" />
      
      <!-- Floating Premium Gourmet Burger inside cloche -->
      <path d="M -16 11 L 0 19 L 16 11 L 16 14 L 0 22 L -16 14 Z" fill="#d97706" /> <!-- Bun lower -->
      <path d="M -18 7 L 0 15 L 18 7 L 0 -1 Z" fill="#f59e0b" /> <!-- Bun upper -->
      <path d="M -18 7 L 0 15 L 18 7 L 18 9 L 0 17 L -18 9 Z" fill="#10b981" /> <!-- Lettuce -->
    </g>

    <!-- ================= 3. FLOATING GLASS CARD (SAVINGS ANALYTICS) ================= -->
    <g transform="translate(-75, -80)" filter="url(#button-shadow)">
      <!-- Beautiful Glassmorphic Floating Panel -->
      <path d="M -50 -25 L -5 -2 L 50 -30 L 5 -53 Z" fill="url(#glass-grad)" fill-opacity="0.65" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.8" />
      
      <!-- Embedded Percentage graphic inside glass -->
      <!-- Green Upward Trend arrow -->
      <path d="M -22 -20 L -12 -15 L -12 -28 Z" fill="#10b981" />
      <path d="M -32 -22 L -22 -17 L -22 -19 L -32 -24 Z" fill="#10b981" />
      
      <!-- Analytical grid indicator on glass and "90% OFF" Mock text indicators -->
      <path d="M 5 -35 L 25 -45" stroke="#ff7e67" stroke-width="3" stroke-linecap="round" />
      <path d="M -10 -25 L 15 -37" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5" />
      
      <!-- Pulse dot for activity -->
      <circle cx="-5" cy="-20" r="3" fill="#10b981" />
    </g>

    <!-- ================= 4. PREMIUM 3D SAVINGS EMBLEM (%) ================= -->
    <g transform="translate(-10, -150)">
      <!-- Floating 3D Sparkle / star indicator -->
      <path d="M 0 -22 L 5 -8 L 19 -5 L 8 4 L 11 18 L 0 10 L -11 18 L -8 4 L -19 -5 L -5 -8 Z" fill="url(#gold-gradient)" filter="url(#button-shadow)" />
      <!-- Shiny highlights -->
      <path d="M 0 -22 L 0 10 L -11 18 L -8 4 Z" fill="#ffe082" fill-opacity="0.3" />
    </g>
    
    <!-- Floating particles around for dynamic energy -->
    <circle cx="-110" cy="-20" r="4" fill="#fbbf24" opacity="0.8" />
    <circle cx="100" cy="-60" r="5" fill="#e23744" opacity="0.6" />
    <circle cx="110" cy="60" r="3" fill="#ffedd5" opacity="0.9" />
    <circle cx="-60" cy="60" r="4.5" fill="#ea580c" opacity="0.5" />
  </g>
</svg>
