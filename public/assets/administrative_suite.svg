<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Shadows and Lighting Filters -->
    <filter id="admin-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="console-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1e1b4b" flood-opacity="0.18" />
    </filter>
    <filter id="shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10b981" flood-opacity="0.3" />
    </filter>

    <!-- Rich Corporate Navy & Emerald Gradients -->
    <radialGradient id="portal-emerald-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.9" />
      <stop offset="55%" stop-color="#e0e7ff" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="console-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <linearGradient id="console-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#c7d2fe" />
    </linearGradient>

    <linearGradient id="navy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <linearGradient id="emerald-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="glass-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Ground Ambient Glow (Emerald/Navy/Indigo Theme) -->
  <circle cx="256" cy="256" r="210" fill="url(#portal-emerald-glow)" />

  <!-- Isometric Base Grid Floor Lines -->
  <g stroke="#4f46e5" stroke-opacity="0.15" stroke-width="1.5">
    <path d="M 96 256 L 256 120 L 416 256 L 256 392 Z" />
    <path d="M 50 256 L 256 80 L 462 256 L 256 432 Z" fill="none" />
    <path d="M 136 256 L 256 150 L 376 256 L 256 362 Z" />
    <path d="M 256 80 L 256 432" stroke-dasharray="4 4" />
    <path d="M 50 256 L 462 256" stroke-dasharray="4 4" />
  </g>

  <!-- MAIN ISOMETRIC SCENE BLOCK -->
  <g transform="translate(256, 270)">
    
    <!-- Shadow for 3D Systems -->
    <ellipse cx="0" cy="80" rx="150" ry="42" fill="#030712" fill-opacity="0.15" filter="blur(16px)" />
    
    <!-- ================= 1. ISOMETRIC CONTROL CONSOLE / SERVER STACK ================= -->
    <g transform="translate(-25, -20)" filter="url(#console-shadow)">
      <!-- Left side depth edge (3D Extrusion) -->
      <path d="M -64 -110 L -72 -104 L -72 136 L -64 130 Z" fill="#312e81" />
      <!-- Bottom side depth edge (3D Extrusion) -->
      <path d="M -72 136 L -20 166 L -12 160 L -64 130 Z" fill="#030712" />
      
      <!-- Console Frame base -->
      <path d="M -64 130 L -12 160 L 68 -100 L 16 -130 Z" fill="url(#console-body)" />
      <!-- Console Top Surface -->
      <path d="M -60 120 L -10 150 L 64 -106 L 14 -136 Z" fill="url(#console-body)" />
      
      <!-- Main Monitor Display Screen (Holographic Interface mockup) -->
      <path d="M -56 112 L -8 141 L 60 -112 L 12 -141 Z" fill="url(#console-screen)" />
      
      <!-- Compliance charts and stats on main screen -->
      <!-- Green Area Graph for CO2 reduction / Carbon offset -->
      <path d="M -44 40 L -25 50 L -10 25 L 10 35 L 30 10 L 40 18 C 40 18 25 100 -20 100 Z" fill="url(#emerald-gradient)" fill-opacity="0.35" />
      <!-- Area Curve Top Line -->
      <path d="M -44 40 L -25 50 L -10 25 L 10 35 L 30 10 L 40 18" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Glow Nodes on Line Graph -->
      <circle cx="-10" cy="25" r="4.5" fill="#34d399" />
      <circle cx="30" cy="10" r="4.5" fill="#ffffff" stroke="#059669" stroke-width="2" />
      
      <!-- Additional gridlines in compliance console -->
      <line x1="-38" y1="80" x2="30" y2="40" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="3 3" />
      <line x1="-48" y1="60" x2="20" y2="20" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="3 3" />
    </g>

    <!-- ================= 2. ISOMETRIC GLASS COMPLIANCE CARD ================= -->
    <g transform="translate(68, 10)">
      <!-- Card Shadow -->
      <ellipse cx="0" cy="50" rx="40" ry="16" fill="#020617" fill-opacity="0.18" filter="blur(6px)" />
      
      <!-- Hologram Glow -->
      <circle cx="0" cy="10" r="35" fill="url(#navy-gradient)" fill-opacity="0.15" filter="url(#admin-glow)" />

      <!-- Float Card -->
      <path d="M -40 10 L 0 28 L 40 10 L 0 -8 Z" fill="url(#glass-indigo)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.65" />
      <!-- Rim Glow edge -->
      <path d="M -40 10 L 0 28 L 40 10 L 40 12 L 0 30 L -40 12 Z" fill="url(#navy-gradient)" />

      <!-- Analytics Nodes on Mini Card (Compliance Log markers) -->
      <circle cx="-15" cy="8" r="3" fill="#10b981" />
      <line x1="-8" y1="12" x2="16" y2="2" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" />
      <line x1="-8" y1="6" x2="8" y2="-2" stroke="#64748b" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" />
    </g>

    <!-- ================= 3. FLOATING 3D HOLOGRAPHIC SECURITY SHIELD/LOCK ================= -->
    <g transform="translate(-65, -60)" filter="url(#shield-shadow)">
      <!-- Outer glowing circle ring -->
      <ellipse cx="0" cy="15" rx="36" ry="18" fill="none" stroke="url(#emerald-gradient)" stroke-width="2" stroke-opacity="0.8" />
      
      <!-- Isometric 3D Shield Model -->
      <!-- Shield Left Side panel -->
      <path d="M -16 -12 L 0 -22 L 0 10 L -16 20 Z" fill="url(#emerald-gradient)" />
      <!-- Shield Right Side panel with glossy highlights -->
      <path d="M 0 -22 L 16 -12 L 16 20 L 0 10 Z" fill="#34d399" />
      <!-- Central Glowing core line -->
      <line x1="0" y1="-18" x2="0" y2="8" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9" />
      
      <!-- Translucent Glassmorphism background for Shield -->
      <path d="M -26 -16 L 0 -28 L 26 -16 L 26 15 L 0 28 L -26 15 Z" fill="url(#glass-indigo)" opacity="0.3" fill-opacity="0.2" />
    </g>

    <!-- ================= 4. FLOATING 3D COMPLIANCE LOG CUBES ================= -->
    <g transform="translate(10, -135)">
      <!-- Top Cube (Emerald) -->
      <g transform="translate(0, 0)">
        <!-- Left Face -->
        <path d="M -12 -6 L 0 0 L 0 10 L -12 4 Z" fill="#047857" />
        <!-- Right Face -->
        <path d="M 0 0 L 12 -6 L 12 4 L 0 10 Z" fill="#10b981" />
        <!-- Top Face -->
        <path d="M -12 -6 L 0 -12 L 12 -6 L 0 0 Z" fill="#34d399" />
      </g>
      
      <!-- Sub-nodes (Indigo network nodes linking to core Admin) -->
      <g transform="translate(-32, -14)">
        <path d="M -8 -4 L 0 0 L 0 7 L -8 3 Z" fill="#312e81" />
        <path d="M 0 0 L 8 -4 L 8 3 L 0 7 Z" fill="#4338ca" />
        <path d="M -8 -4 L 0 -8 L 8 -4 L 0 0 Z" fill="#6366f1" />
      </g>
      
      <!-- Linking lines of light -->
      <line x1="-32" y1="-14" x2="0" y2="0" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="2 2" />
    </g>

    <!-- Glow particles representing verified data signals -->
    <circle cx="-110" cy="15" r="4.5" fill="#059669" opacity="0.85" />
    <circle cx="100" cy="-35" r="3.5" fill="#4f46e5" opacity="0.8" />
    <circle cx="-35" cy="-115" r="4" fill="#d1fae5" opacity="0.9" />
    <circle cx="65" cy="55" r="4.5" fill="#34d399" opacity="0.6" stroke="#ffffff" stroke-width="1" />
  </g>
</svg>
